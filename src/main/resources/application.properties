spring.application.name=jbank
server.port=9000

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jbank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3s
spring.data.redis.repositories.enabled=false

app.jwt.secret=${JWT_SECRET:neobanksecretkey-neobanksecretkey}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

resilience4j.retry.instances.redisRetry.max-attempts=3
resilience4j.retry.instances.redisRetry.wait-duration=200ms
resilience4j.circuitbreaker.instances.redisCircuit.sliding-window-size=10
resilience4j.circuitbreaker.instances.redisCircuit.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.redisCircuit.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redisCircuit.wait-duration-in-open-state=10s

